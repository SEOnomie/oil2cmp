name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Bundle-Size-Budget (<= 10 KB gzipped)
        run: |
          SIZE=$(gzip -c dist/oil2.min.js | wc -c)
          LIMIT=10240
          echo "Gzip-Größe von dist/oil2.min.js: ${SIZE} Bytes (Limit: ${LIMIT})"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "::error::Bundle überschreitet das 10-KB-Budget (${SIZE} > ${LIMIT} Bytes)."
            exit 1
          fi
          echo "✅ Innerhalb des Budgets."
